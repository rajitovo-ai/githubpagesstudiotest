<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyan gradient -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dark gradient -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050810;stop-opacity:1" />
    </linearGradient>
    
    <!-- Screen gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000d17;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#darkBg)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="600" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <!-- Floating particles -->
  <g filter="url(#glow)" opacity="0.6">
    <circle cx="150" cy="120" r="2" fill="#00d4ff"/>
    <circle cx="650" cy="180" r="1.5" fill="#00d4ff"/>
    <circle cx="200" cy="480" r="2" fill="#0066ff"/>
    <circle cx="600" cy="450" r="1.5" fill="#00d4ff"/>
    <circle cx="100" cy="300" r="1" fill="#00d4ff"/>
    <circle cx="700" cy="350" r="1" fill="#0066ff"/>
  </g>

  <!-- Monitor frame -->
  <g filter="url(#strongGlow)">
    <!-- Outer frame -->
    <rect x="150" y="80" width="500" height="320" rx="8" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
    
    <!-- Inner bezel -->
    <rect x="160" y="90" width="480" height="300" rx="4" fill="url(#screenGrad)" stroke="#00d4ff" stroke-width="0.5" opacity="0.8"/>
  </g>

  <!-- Screen content - Abstract UI -->
  <g opacity="0.7">
    <!-- Top bar -->
    <rect x="170" y="100" width="460" height="25" fill="#001a2e" opacity="0.5"/>
    <circle cx="185" cy="112" r="4" fill="#00d4ff" opacity="0.8"/>
    <circle cx="200" cy="112" r="4" fill="#0066ff" opacity="0.6"/>
    <circle cx="215" cy="112" r="4" fill="#00d4ff" opacity="0.4"/>
    
    <!-- Sidebar -->
    <rect x="170" y="130" width="60" height="250" fill="#001a2e" opacity="0.3"/>
    <line x1="180" y1="150" x2="220" y2="150" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="180" y1="170" x2="210" y2="170" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="180" y1="190" x2="215" y2="190" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="180" y1="210" x2="205" y2="210" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    
    <!-- Main content area -->
    <rect x="240" y="140" width="380" height="120" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
    <rect x="250" y="150" width="150" height="8" rx="2" fill="#00d4ff" opacity="0.3"/>
    <rect x="250" y="165" width="280" height="4" rx="2" fill="#0066ff" opacity="0.2"/>
    <rect x="250" y="175" width="260" height="4" rx="2" fill="#0066ff" opacity="0.2"/>
    <rect x="250" y="185" width="240" height="4" rx="2" fill="#0066ff" opacity="0.2"/>
    <rect x="250" y="195" width="200" height="4" rx="2" fill="#0066ff" opacity="0.2"/>
    
    <!-- Charts/Graph area -->
    <rect x="240" y="270" width="180" height="100" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <polyline points="250,350 280,320 310,340 340,290 370,310 400,260" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="280" cy="320" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="340" cy="290" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="400" cy="260" r="3" fill="#00d4ff" opacity="0.8"/>
    
    <!-- Data visualization -->
    <rect x="430" y="270" width="180" height="100" rx="4" fill="none" stroke="#0066ff" stroke-width="0.5" opacity="0.3"/>
    <rect x="445" y="320" width="20" height="40" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="475" y="300" width="20" height="60" rx="2" fill="#00d4ff" opacity="0.5"/>
    <rect x="505" y="280" width="20" height="80" rx="2" fill="#00d4ff" opacity="0.6"/>
    <rect x="535" y="310" width="20" height="50" rx="2" fill="#0066ff" opacity="0.4"/>
    <rect x="565" y="290" width="20" height="70" rx="2" fill="#0066ff" opacity="0.5"/>
  </g>

  <!-- Monitor stand -->
  <g filter="url(#glow)">
    <path d="M 350 400 L 350 450 L 300 480 L 500 480 L 450 450 L 450 400" fill="none" stroke="url(#cyanGlow)" stroke-width="1.5"/>
    <line x1="370" y1="405" x2="370" y2="445" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="430" y1="405" x2="430" y2="445" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Hologram effect lines -->
  <g opacity="0.3">
    <line x1="140" y1="70" x2="160" y2="90" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="660" y1="70" x2="640" y2="90" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="140" y1="410" x2="160" y2="390" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="660" y1="410" x2="640" y2="390" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <!-- Corner accents -->
  <g filter="url(#glow)" opacity="0.8">
    <path d="M 150 95 L 150 85 L 160 85" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <path d="M 650 95 L 650 85 L 640 85" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <path d="M 150 385 L 150 395 L 160 395" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <path d="M 650 385 L 650 395 L 640 395" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  </g>
</svg>