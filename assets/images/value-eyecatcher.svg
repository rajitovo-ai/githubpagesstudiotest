<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a45e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8843d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f35;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#faf9f7"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="520" cy="420" r="80" fill="url(#grad1)" opacity="0.08"/>

  <!-- Laptop/Monitor Frame -->
  <g filter="url(#shadow)">
    <!-- Screen -->
    <rect x="80" y="60" width="440" height="280" rx="12" fill="#fff" stroke="url(#grad2)" stroke-width="2"/>
    
    <!-- Screen content - Website mockup -->
    <rect x="95" y="75" width="410" height="250" fill="#f5f4f1" rx="8"/>
    
    <!-- Header bar -->
    <rect x="95" y="75" width="410" height="35" fill="url(#grad1)" rx="8"/>
    <circle cx="110" cy="92" r="4" fill="#fff" opacity="0.6"/>
    <circle cx="125" cy="92" r="4" fill="#fff" opacity="0.6"/>
    <circle cx="140" cy="92" r="4" fill="#fff" opacity="0.6"/>
    
    <!-- Content lines -->
    <rect x="110" y="125" width="380" height="8" fill="#c8a45e" opacity="0.3" rx="4"/>
    <rect x="110" y="145" width="350" height="6" fill="#1a1a1a" opacity="0.2" rx="3"/>
    <rect x="110" y="160" width="360" height="6" fill="#1a1a1a" opacity="0.2" rx="3"/>
    <rect x="110" y="175" width="340" height="6" fill="#1a1a1a" opacity="0.2" rx="3"/>
    
    <!-- Button -->
    <rect x="110" y="205" width="120" height="35" fill="url(#grad1)" rx="6"/>
    <text x="170" y="228" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Meer Info</text>
  </g>

  <!-- Laptop stand -->
  <g>
    <path d="M 150 340 L 120 380 L 480 380 L 450 340" fill="url(#grad2)" opacity="0.8"/>
    <rect x="280" y="380" width="40" height="30" fill="url(#grad2)" opacity="0.6" rx="4"/>
  </g>

  <!-- Floating design elements -->
  <g opacity="0.6">
    <!-- Color palette -->
    <circle cx="420" cy="420" r="12" fill="#c8a45e"/>
    <circle cx="450" cy="410" r="12" fill="#0a0e1a"/>
    <circle cx="480" cy="425" r="12" fill="#7d9a78"/>
    
    <!-- Design tools icons -->
    <g transform="translate(80, 420)">
      <rect width="20" height="20" fill="none" stroke="#c8a45e" stroke-width="2" rx="3"/>
      <circle cx="10" cy="10" r="3" fill="#c8a45e"/>
    </g>
  </g>

  <!-- Checkmarks for features -->
  <g>
    <!-- Checkmark 1 -->
    <circle cx="320" cy="450" r="18" fill="#c8a45e" opacity="0.2"/>
    <path d="M 315 450 L 318 453 L 325 446" stroke="#c8a45e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Checkmark 2 -->
    <circle cx="380" cy="460" r="18" fill="#c8a45e" opacity="0.2"/>
    <path d="M 375 460 L 378 463 L 385 456" stroke="#c8a45e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text labels -->
  <text x="300" y="495" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">Professioneel Webdesign</text>
</svg>