<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#05070a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f4d03f;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="600" fill="url(#bgGradient)"/>
  
  <!-- Subtle background glow -->
  <circle cx="300" cy="300" r="250" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.2"/>
  <circle cx="300" cy="300" r="200" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.15"/>
  
  <!-- Laptop/Monitor frame - minimalist -->
  <g transform="translate(150, 120)">
    <!-- Screen -->
    <rect x="0" y="0" width="300" height="200" rx="8" fill="none" stroke="#d4af37" stroke-width="2"/>
    
    <!-- Subtle gradient inside screen -->
    <rect x="4" y="4" width="292" height="192" rx="6" fill="#16273e" opacity="0.3"/>
    
    <!-- Thin stand -->
    <rect x="140" y="210" width="20" height="80" fill="#d4af37" opacity="0.4"/>
    
    <!-- Base -->
    <rect x="80" y="290" width="140" height="8" rx="4" fill="#d4af37" opacity="0.3"/>
  </g>
  
  <!-- Minimal design elements in screen -->
  <g transform="translate(170, 160)" opacity="0.6">
    <!-- Three horizontal lines representing content -->
    <line x1="0" y1="20" x2="260" y2="20" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="45" x2="200" y2="45" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="70" x2="240" y2="70" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Floating circles - representing growth/positive impact -->
  <g opacity="0.3">
    <circle cx="450" cy="150" r="30" fill="none" stroke="#d4af37" stroke-width="2"/>
    <circle cx="420" cy="250" r="25" fill="none" stroke="#d4af37" stroke-width="2"/>
    <circle cx="480" cy="350" r="35" fill="none" stroke="#d4af37" stroke-width="2"/>
  </g>
  
  <!-- Center accent circle -->
  <circle cx="300" cy="300" r="40" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.4"/>
  <circle cx="300" cy="300" r="30" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="300" r="5" fill="#d4af37" opacity="0.6"/>
</svg>